<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>KentuOS</title>
    <meta name="description" content="KentuOS — Tracker e motore biochimico per energia, pasti e benessere.">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/kentuos_icon_192.png" />
    <meta name="theme-color" content="#050a12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KentuOS">
    <link rel="apple-touch-icon" href="/kentuos_icon_192.png" />
  </head>
  <body style="margin:0;background:#050a12;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /* TEMP: unregister per svuotare cache SW e forzare nuove icone. Ripristina register('/sw.js') quando ok. */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistrations().then((regs) => {
            regs.forEach((reg) => reg.unregister());
            console.log('KentuOS: Service Worker unregistered (cache bust / icone).');
          }).catch((err) => console.error('SW unregister error:', err));
        });
      }
    </script>
  </body>
</html>
